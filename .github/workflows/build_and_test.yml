name: Build and Test

on:
  push:
    branches:
      - dev
      - 'release/**'
    paths:
      - '**'
  pull_request:
    branches:
      - dev
      - 'release/**'
    paths:
      - '**'

jobs:
  prepare-build:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.set-vars.outputs.should_publish }}
      lerna-since-flag: ${{ steps.set-vars.outputs.lerna_since_flag }}
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
    steps:
      - name: Set branch context variables
        id: set-vars
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"

          if [[ "$BRANCH_NAME" == "dev" || "$BRANCH_NAME" =~ ^release/ ]]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            echo "lerna_since_flag=--since=origin/dev" >> $GITHUB_OUTPUT
          else
            echo "lerna_since_flag=" >> $GITHUB_OUTPUT
          fi

      - name: Show variables
        run: |
          echo "should_publish=${{ steps.set-vars.outputs.should_publish }}"
          echo "lerna_since_flag=${{ steps.set-vars.outputs.lerna_since_flag }}"

  pull-request:
    runs-on: ubuntu-latest
    needs: prepare-build
    if: needs.prepare-build.outputs.should-publish != 'true'
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
          dotnet-quality: 'ga'

      - name: Show variables
        run: |
          echo "[PR] should_publish=${{ needs.prepare-build.outputs.should-publish }}"
          echo "[PR] lerna_since_flag=${{ needs.prepare-build.outputs.lerna-since-flag }}"

      - name: Install dependencies
        run: |
          yarn cache clean --all
          yarn install --immutable

      - name: Build packages
        run: npm run build

      - name: Lint packages
        run: |
          yarn lint-packages ${{ needs.prepare-build.outputs.lerna-since-flag }}

      - name: Run tests and collect coverage
        run: yarn coverage-packages
        env:
          testEnv: ci

      - name: Generate code coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: '**/cobertura-coverage.xml'
          targetdir: './coverlet'
          reporttypes: 'HtmlInline;MarkdownSummaryGithub;Cobertura'

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverlet

      - name: Publish coverage in build summary
        run: cat coverlet/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Scaffold samples
        run: yarn scaffold-samples

      - name: Yarn install (refresh)
        run: yarn install

      - name: Lint samples
        run: yarn lint-samples ${{ needs.prepare-build.outputs.lerna-since-flag }}

  publish:
    runs-on: ubuntu-latest
    needs: prepare-build
    if: needs.prepare-build.outputs.should-publish == 'true'
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show variables
        run: |
          echo "[Publish] should_publish=${{ needs.prepare-build.outputs.should-publish }}"
          echo "[Publish] lerna_since_flag=${{ needs.prepare-build.outputs.lerna-since-flag }}"

      - name: Install dependencies
        run: |
          yarn cache clean --all
          yarn install --immutable

      - name: Build packages
        run: npm run build

      - name: Git configuration for publishing
        run: |
          git config user.email builds@sitecore.com
          git config user.name "Automated Build"
          git remote set-url origin https://$GITHUB_PAT_ENV@github.com/${{ github.repository }}
          git checkout ${{ github.head_ref || github.ref_name }}
        env:
          GITHUB_PAT_ENV: ${{ secrets.GITHUB_PAT }}

      - name: Generate API docs
        run: |
          yarn generate-docs
          git add ./ref-docs/**/*
          git commit -m "Update API docs [skip ci]"

      - name: Pre-release version update
        run: |
          npm exec -- lerna version prerelease --exact --preid canary --force-publish --message "version %s [skip ci]" --yes

      - name: Pre-release canary publish
        run: |
          echo //registry.npmjs.org/:_authToken=${NPM_TOKEN} > .npmrc
          npm exec -- lerna publish from-git --exact --canary --pre-dist-tag canary --preid canary --no-verify-access --yes
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

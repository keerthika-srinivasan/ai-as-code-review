name: Pull Request Build

on:
  pull_request:
    branches:
      - dev
      - 'release/**'
    paths:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
          dotnet-quality: 'ga'

      - name: Install dependencies
        run: |
          yarn cache clean --all
          yarn install --immutable

      - name: Build packages
        run: npm run build

      - name: Lint packages
        run: |
          yarn lint-packages

      - name: Run tests and collect coverage
        run: yarn coverage-packages
        env:
          testEnv: ci

      - name: Generate code coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: '**/cobertura-coverage.xml'
          targetdir: './coverlet'
          reporttypes: 'HtmlInline;MarkdownSummaryGithub;Cobertura'

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverlet

      - name: Publish coverage in build summary
        run: cat coverlet/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Scaffold samples
        run: yarn scaffold-samples
